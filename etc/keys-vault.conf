# keys-vault configuration
# User overrides: ${XDG_CONFIG_HOME:-~/.config}/keys-vault.conf
#
# CLI flags (--dir, --cipher-dir) take precedence over config files.
# Use $HOME, ${HOME}, or ~ for path expansion.

# Plaintext mount point (default: ~/keys)
#PLAIN_DIR = $HOME/keys

# Encrypted ciphertext directory
# Default: hidden directory derived from PLAIN_DIR
#   ~/keys         -> ~/.keys.enc
#   ~/secure/vault -> ~/secure/.vault.enc
#CIPHER_DIR = $HOME/.keys.enc
