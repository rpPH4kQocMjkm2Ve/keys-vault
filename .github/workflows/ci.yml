name: CI

on:
  push:
    paths:
      - 'bin/**'
      - 'tests/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'bin/**'
      - 'tests/**'
      - '.github/workflows/ci.yml'

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: shellcheck -s bash bin/keys-vault

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: |
          for t in tests/test_config.sh tests/test_cli.sh tests/test_commands.sh; do
            echo "━━━ $t ━━━"
            bash "$t" || exit 1
          done
