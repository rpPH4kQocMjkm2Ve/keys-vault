name: CI

on:
  push:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'Makefile'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'Makefile'
      - '.github/workflows/ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y nasm binutils
      - name: Build
        run: make build
      - name: Verify binary
        run: file keys-vault | grep -q ELF

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y nasm binutils
      - name: Run tests
        run: make test
      - name: Clean up mock scripts
        if: always()
        run: make clean-mocks || true
